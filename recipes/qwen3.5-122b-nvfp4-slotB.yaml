# Recipe: Qwen3.5-122B-NVFP4 (Slot B)
# txn545/Qwen3.5-122B-A10B-NVFP4 — 122B MoE, ~10B active params/token, fits in 128GB unified memory
# Alternate slot — port 8004
#
# SM121 (GB10) NOTE: FLASHINFER_CUTLASS MoE backend generates unsupported PTX (cvt .e2m1x2)
# on SM121. Must use MARLIN backend via env vars below.
# Reference: https://forums.developer.nvidia.com/t/361819

recipe_version: "1"
name: Qwen3.5-122B-NVFP4-SlotB
description: vLLM serving Qwen3.5-122B-NVFP4 on port 8004 (alternate slot)

model: txn545/Qwen3.5-122B-A10B-NVFP4

container: vllm-node

solo_only: true

mods:
  - mods/fix-qwen3.5-chat-template

defaults:
  port: 8004
  host: 0.0.0.0
  tensor_parallel: 1
  gpu_memory_utilization: 0.76
  max_model_len: 65536
  max_num_batched_tokens: 8192

env:
  # Force MARLIN backend — FLASHINFER_CUTLASS is broken on SM121 (GB10 Blackwell)
  VLLM_USE_FLASHINFER_MOE_FP4: 0
  VLLM_NVFP4_GEMM_BACKEND: "marlin"
  VLLM_TEST_FORCE_FP8_MARLIN: 1

command: |
  vllm serve txn545/Qwen3.5-122B-A10B-NVFP4 \
     --max-model-len {max_model_len} \
     --max-num-seqs 16 \
     --port {port} --host {host} \
     --trust-remote-code \
     --enable-auto-tool-choice \
     --tool-call-parser qwen3_coder \
     --reasoning-parser qwen3 \
     --enable-prefix-caching \
     --load-format safetensors \
     --gpu-memory-utilization {gpu_memory_utilization} \
     --max-num-batched-tokens {max_num_batched_tokens}
